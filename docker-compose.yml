# AgentTrace — docker-compose
# Two services: `web` (Next.js on 3000) + `socket` (Socket.IO on 3003).
# A reverse proxy / gateway in front routes ?XTransformPort=3003 to `socket`.

services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agenttrace}
      POSTGRES_USER: ${POSTGRES_USER:-agenttrace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agenttrace}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agenttrace} -d ${POSTGRES_DB:-agenttrace}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
    image: agenttrace-web:latest
    ports:
      - "3000:3000"
    environment:
      # NextAuth
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-agenttrace}:${POSTGRES_PASSWORD:-agenttrace}@db:5432/${POSTGRES_DB:-agenttrace}
      # Where to find the socket service (container DNS name)
      SOCKET_SERVICE_URL: http://socket:3003
    volumes:
      - agenttrace-data:/app/data
    depends_on:
      db:
        condition: service_healthy
      socket:
        condition: service_started
    restart: unless-stopped

  socket:
    build:
      context: .
      target: socket
    image: agenttrace-socket:latest
    ports:
      - "3003:3003"
    environment:
      SOCKET_SERVICE_PORT: "3003"
    restart: unless-stopped

volumes:
  agenttrace-data:
  pgdata:
