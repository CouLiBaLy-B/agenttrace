# AgentTrace — CI
# Runs on every push and pull request:
#   1. lint  (eslint)
#   2. typecheck (tsc --noEmit)
#   3. build (next build, standalone output)
#   4. docker build (both web + socket targets)
#
# Bun is used as the runtime/package manager to match local dev.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-flight runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────
  # lint + typecheck + build (Node/Bun)
  # ────────────────────────────────────────────────────────────
  quality:
    name: lint · typecheck · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate
        env:
          # generate doesn't connect, but the URL scheme must match the
          # postgresql provider in schema.prisma.
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Build (Next.js standalone)
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # next build reads DATABASE_URL via prisma generate; a dummy postgres
          # value is fine because we don't run migrations or queries at build time.
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

  # ────────────────────────────────────────────────────────────
  # Docker images (web + socket)
  # ────────────────────────────────────────────────────────────
  docker:
    name: docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image (Next.js standalone)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: web
          push: false
          load: true
          tags: agenttrace-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build socket image (Socket.IO service)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: socket
          push: false
          load: true
          tags: agenttrace-socket:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — web responds
        run: |
          # web runs `prisma db push` on boot, so it needs a real Postgres.
          # Put both containers on a shared network so web reaches it by DNS name.
          docker network create agenttrace-ci
          docker run -d --name pg --network agenttrace-ci \
            -e POSTGRES_DB=agenttrace \
            -e POSTGRES_USER=agenttrace \
            -e POSTGRES_PASSWORD=agenttrace \
            postgres:16-alpine
          # wait for postgres to accept connections
          for i in $(seq 1 30); do
            docker exec pg pg_isready -U agenttrace -d agenttrace >/dev/null 2>&1 && { echo "pg ready"; break; }
            sleep 1
          done
          docker run -d --name web --network agenttrace-ci -p 3000:3000 \
            -e DATABASE_URL="postgresql://agenttrace:agenttrace@pg:5432/agenttrace" \
            -e NEXTAUTH_SECRET="ci-secret" \
            -e NEXTAUTH_URL="http://localhost:3000" \
            -e SOCKET_SERVICE_URL="http://localhost:3003" \
            agenttrace-web:ci
          # wait for the server to come up
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo 000)
            [ "$code" = "200" ] && { echo "web up ($code)"; break; }
            sleep 1
          done
          curl -sf -o /dev/null "http://localhost:3000/api/auth/providers" || { echo "web /api/auth/providers failed"; docker logs web; exit 1; }
          echo "web smoke test passed"

      - name: Smoke test — socket responds
        run: |
          docker run -d --name socket -p 3003:3003 agenttrace-socket:ci
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3003/ || echo 000)
            [ "$code" = "200" ] && { echo "socket up ($code)"; break; }
            sleep 1
          done
          echo "socket smoke test passed"
