name: Publish agenttrace-langchain to PyPI

# Trusted Publishing (OIDC) — no API token stored in GitHub secrets.
# One-time setup required on pypi.org before the first run: register this
# repo/workflow as a "trusted publisher" for the `agenttrace-langchain`
# PyPI project (pypi.org -> Publishing -> Add a pending publisher):
#   Owner: CouLiBaLy-B, Repository: agenttrace
#   Workflow filename: publish-agenttrace-langchain.yml
#   Environment name: pypi-agenttrace-langchain
on:
  release:
    types: [published]
  push:
    tags:
      - "agenttrace-langchain-v*"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/agenttrace-langchain
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: integrations/agenttrace-langchain/dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi-agenttrace-langchain
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
